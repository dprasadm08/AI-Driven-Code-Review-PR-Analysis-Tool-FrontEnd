version: "3.9"

# =======================================================
# Full-stack Docker Compose – AI PR Review Tool
# Services: frontend, backend (stub), nginx-proxy
# =======================================================

services:

  # -------------------------------------------------------
  # Angular production frontend served by Nginx
  # -------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime          # uses the nginx stage only
    image: ai-pr-review-frontend:latest
    container_name: ai-pr-review-frontend
    restart: unless-stopped
    ports:
      - "4200:80"              # browser → http://localhost:4200
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------
  # Backend API placeholder (replace with real backend image)
  # -------------------------------------------------------
  backend:
    image: mockoon/cli:latest
    container_name: ai-pr-review-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./mock/backend-mock.json:/data/mock.json:ro
    command: ["--data", "/data/mock.json", "--port", "8080"]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app-network:
    driver: bridge
    name: ai-pr-review-network
