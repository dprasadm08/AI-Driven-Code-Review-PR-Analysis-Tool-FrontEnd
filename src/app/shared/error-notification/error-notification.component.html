<div class="error-notification-container" [class.has-errors]="errors.length > 0">
  <div class="errors-list">
    <app-http-error
      *ngFor="let error of errors; trackBy: trackByErrorId"
      [error]="error"
      [showDetails]="false"
      (dismiss)="dismissError(error.id!)"
      (retry)="retryError(error)"
    ></app-http-error>
  </div>
</div>
