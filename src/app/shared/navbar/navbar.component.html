<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/dashboard">
        <h2>AI PR Review</h2>
      </a>
    </div>
    
    <button class="navbar-toggle" (click)="toggleMobileMenu()" aria-label="Toggle navigation menu">
      <span class="hamburger" [class.active]="mobileMenuOpen"></span>
    </button>
    
    <div class="navbar-menu" [class.mobile-open]="mobileMenuOpen" *ngIf="isLoggedIn()">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileMenu()">Dashboard</a>
      <a routerLink="/repositories" routerLinkActive="active" (click)="closeMobileMenu()">Repositories</a>
      <a routerLink="/pull-requests" routerLinkActive="active" (click)="closeMobileMenu()">Pull Requests</a>
      <a routerLink="/analysis" routerLinkActive="active" (click)="closeMobileMenu()">Analysis</a>
      <a routerLink="/settings/ai-provider" routerLinkActive="active" (click)="closeMobileMenu()">AI Provider</a>
      <a routerLink="/settings/webhooks" routerLinkActive="active" (click)="closeMobileMenu()">Webhooks</a>
    </div>
    
    <div class="navbar-actions">
      <button *ngIf="isLoggedIn()" class="btn btn-secondary" (click)="logout()">Logout</button>
      <a *ngIf="!isLoggedIn()" routerLink="/auth/login" class="btn btn-primary">Login</a>
    </div>
  </div>
</nav>
