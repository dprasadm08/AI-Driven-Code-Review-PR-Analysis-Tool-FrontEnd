<div class="auth-container">
  <div class="auth-card">
    <h2>Sign In to AI PR Review</h2>
    <p class="auth-subtitle">Analyze pull requests with AI-powered insights</p>
    
    <app-error-message [message]="errorMessage" type="error"></app-error-message>
    
    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          type="text"
          id="username"
          class="form-control"
          [(ngModel)]="username"
          name="username"
          required
          placeholder="Enter your username"
        />
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="Enter your password"
        />
      </div>
      
      <button type="submit" class="btn btn-primary btn-full" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    
    <p class="auth-footer">
      Don't have an account? <a routerLink="/auth/signup">Sign up</a>
    </p>
  </div>
</div>
